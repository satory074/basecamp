# Firebase App Hosting backend config for satory074.com (Cloud Run, asia-northeast1)
# Docs: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  cpu: 1
  memoryMiB: 512
  concurrency: 80
  maxInstances: 3
  minInstances: 0  # scale to zero (no traffic = no cost)

env:
  # 公開設定: site URL (ブラウザに見せても安全)
  - variable: NEXT_PUBLIC_BASE_URL
    value: https://satory074.com
    availability:
      - BUILD
      - RUNTIME

  # GCS bucket for feed JSON (公開バケット名)
  - variable: GCS_BUCKET
    value: basecamp-feeds
    availability:
      - BUILD
      - RUNTIME

  # Supabase 公開鍵 (NEXT_PUBLIC_* はクライアントからアクセス可)
  - variable: NEXT_PUBLIC_SUPABASE_URL
    secret: NEXT_PUBLIC_SUPABASE_URL
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_SUPABASE_ANON_KEY
    secret: NEXT_PUBLIC_SUPABASE_ANON_KEY
    availability:
      - BUILD
      - RUNTIME

  # Server-only secrets (Cloud Run runtime のみ)
  - variable: SUPABASE_SERVICE_ROLE_KEY
    secret: SUPABASE_SERVICE_ROLE_KEY
    availability:
      - RUNTIME
  - variable: NAITA_SECRET
    secret: NAITA_SECRET
    availability:
      - RUNTIME
