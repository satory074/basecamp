name: Monthly Secret Audit

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo: [basecamp, odekaketenki, uranai, Annasui]
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: satory074/${{ matrix.repo }}
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz" | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan full git history
        id: scan
        run: |
          set +e
          gitleaks git --no-banner --report-format json --report-path /tmp/leaks.json --exit-code 1 .
          code=$?
          set -e
          count=$(jq 'length' /tmp/leaks.json 2>/dev/null || echo 0)
          echo "exit=$code count=$count"
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          echo "leak_count=$count" >> "$GITHUB_OUTPUT"
          exit $code

      - name: Notify Discord on findings
        if: failure() && steps.scan.outputs.leak_count != '0'
        run: |
          count="${{ steps.scan.outputs.leak_count }}"
          payload=$(jq -nc --arg msg "⚠️ Monthly secret audit: \`satory074/${{ matrix.repo }}\` で ${count} 件検出 — run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" '{content: $msg}')
          curl -sS -X POST -H "Content-Type: application/json" -d "$payload" "${{ secrets.DISCORD_WEBHOOK_URL }}"
