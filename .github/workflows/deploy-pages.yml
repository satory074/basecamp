name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # JST 09:00 / 21:00 (UTC 00:00 / 12:00) — refresh feeds twice a day
    - cron: "0 0,12 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build static site
        env:
          GCS_BUCKET: basecamp-feeds
          NEXT_PUBLIC_BASE_URL: https://satory074.com
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
