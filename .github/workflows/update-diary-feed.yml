name: Update Diary Feed

on:
  schedule:
    - cron: "30 14 * * *" # 毎日 23:30 JST (14:30 UTC)
  workflow_dispatch:
    inputs:
      target_date:
        description: "生成対象の日付 (YYYY-MM-DD)。空欄で当日。"
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  update-diary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/130346180231/locations/global/workloadIdentityPools/github-pool/providers/github
          service_account: gha-feed-writer@basecamp-satory074.iam.gserviceaccount.com

      - name: Generate diary entry
        env:
          GCS_BUCKET: basecamp-feeds
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TARGET_DATE: ${{ inputs.target_date }}
        run: npx tsx scripts/update-diary-feed.ts
