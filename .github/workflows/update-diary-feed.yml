name: Update Diary Feed

on:
  schedule:
    - cron: "30 14 * * *" # 毎日 23:30 JST (14:30 UTC)
  workflow_dispatch:
    inputs:
      target_date:
        description: "生成対象の日付 (YYYY-MM-DD)。空欄で当日。"
        required: false
        type: string

permissions:
  contents: write

jobs:
  update-diary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Generate diary entry
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TARGET_DATE: ${{ inputs.target_date }}
        run: npx tsx scripts/update-diary-feed.ts

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/diary-feed.json
          git diff --staged --quiet || (git commit -m "chore: update diary feed $(date -u +%Y-%m-%d)" && git push)
