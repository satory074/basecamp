name: Update X Feed

on:
  schedule:
    - cron: "20 */3 * * *"
  workflow_dispatch:
    inputs:
      new_refresh_token:
        description: "New X_REFRESH_TOKEN (leave empty for normal run)"
        required: false
        default: ""
      fetch_pages:
        description: "ページ数 (default 2, 多めに取得して取りこぼし回収)"
        required: false
        default: "2"
      fetch_max_results:
        description: "1ページの件数 (default 10, X API 上限 100)"
        required: false
        default: "10"

permissions:
  contents: read
  id-token: write

jobs:
  update-x-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Update refresh token if provided
        if: ${{ github.event.inputs.new_refresh_token != '' }}
        run: |
          gh secret set X_REFRESH_TOKEN --body "${{ github.event.inputs.new_refresh_token }}" --repo "${{ github.repository }}"
          echo "X_REFRESH_TOKEN updated via workflow_dispatch"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/130346180231/locations/global/workloadIdentityPools/github-pool/providers/github
          service_account: gha-feed-writer@basecamp-satory074.iam.gserviceaccount.com

      - name: Fetch X feed
        env:
          GCS_BUCKET: basecamp-feeds
          X_CLIENT_ID: ${{ secrets.X_CLIENT_ID }}
          X_CLIENT_SECRET: ${{ secrets.X_CLIENT_SECRET }}
          X_REFRESH_TOKEN: ${{ secrets.X_REFRESH_TOKEN }}
          X_USER_ID: ${{ secrets.X_USER_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          X_FETCH_PAGES: ${{ github.event.inputs.fetch_pages || '2' }}
          X_FETCH_MAX_RESULTS: ${{ github.event.inputs.fetch_max_results || '10' }}
        run: npx tsx scripts/update-x-feed.ts
