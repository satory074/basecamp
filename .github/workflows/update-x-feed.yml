name: Update X Feed

on:
  schedule:
    # 毎日 12:20 JST (03:20 UTC)
    - cron: "20 */3 * * *"
  workflow_dispatch:
    inputs:
      new_refresh_token:
        description: "New X_REFRESH_TOKEN (leave empty for normal run)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  update-x-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Update refresh token if provided
        if: ${{ github.event.inputs.new_refresh_token != '' }}
        run: |
          gh secret set X_REFRESH_TOKEN --body "${{ github.event.inputs.new_refresh_token }}" --repo "${{ github.repository }}"
          echo "X_REFRESH_TOKEN updated via workflow_dispatch"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Fetch X feed
        env:
          X_CLIENT_ID: ${{ secrets.X_CLIENT_ID }}
          X_CLIENT_SECRET: ${{ secrets.X_CLIENT_SECRET }}
          X_REFRESH_TOKEN: ${{ secrets.X_REFRESH_TOKEN }}
          X_USER_ID: ${{ secrets.X_USER_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: npx tsx scripts/update-x-feed.ts

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/x-tweets.json
          git diff --staged --quiet || git commit -m "chore: update X feed $(date -u +%Y-%m-%d) [skip-cd]" && git push
