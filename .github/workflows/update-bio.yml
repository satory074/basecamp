name: Update Bio

on:
  schedule:
    # 毎週月曜 12:35 JST (03:35 UTC)
    - cron: "35 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  update-bio:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/130346180231/locations/global/workloadIdentityPools/github-pool/providers/github
          service_account: gha-feed-writer@basecamp-satory074.iam.gserviceaccount.com

      - name: Generate bio
        env:
          GCS_BUCKET: basecamp-feeds
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: npx tsx scripts/update-bio.ts
