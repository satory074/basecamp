name: Update Swarm Feed

on:
  schedule:
    - cron: "5 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-swarm-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Fetch Swarm checkins
        env:
          FOURSQUARE_ACCESS_TOKEN: ${{ secrets.FOURSQUARE_ACCESS_TOKEN }}
          SWARM_BLOCKED_VENUE_IDS: ${{ secrets.SWARM_BLOCKED_VENUE_IDS }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: npx tsx scripts/update-swarm-feed.ts

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/swarm-checkins.json
          git diff --staged --quiet || git commit -m "chore: update Swarm feed $(date -u +%Y-%m-%d)" && git push
