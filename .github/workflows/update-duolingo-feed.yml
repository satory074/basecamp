name: Update Duolingo Feed

on:
  schedule:
    # 毎日 12:25 JST (03:25 UTC)
    - cron: "25 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-duolingo-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Fetch Duolingo feed
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: npx tsx scripts/update-duolingo-feed.ts

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/duolingo-stats.json
          git diff --staged --quiet || git commit -m "chore: update Duolingo feed $(date -u +%Y-%m-%d) [skip-cd]" && git push
