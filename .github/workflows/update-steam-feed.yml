name: Update Steam Feed

on:
  schedule:
    # 毎日 12:30 JST (03:30 UTC)
    - cron: "30 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-steam-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Fetch Steam achievements
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          STEAM_USER_ID: ${{ secrets.STEAM_USER_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: npx tsx scripts/update-steam-feed.ts

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/steam-achievements.json
          git diff --staged --quiet || git commit -m "chore: update Steam feed $(date -u +%Y-%m-%d)" && git push
