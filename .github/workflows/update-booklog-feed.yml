name: Update Booklog Feed

on:
  schedule:
    - cron: "40 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-booklog-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Fetch Booklog feed
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: npx tsx scripts/update-booklog-feed.ts

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/booklog-feed.json public/data/booklog-cache.json
          git diff --staged --quiet || git commit -m "chore: update Booklog feed $(date -u +%Y-%m-%d)" && git push
