name: Send Daily Digest

on:
  schedule:
    # 毎日 23:00 JST (14:00 UTC) — diary 実行の30分前
    - cron: "0 14 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-daily-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Send digest
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: npx tsx scripts/send-daily-digest.ts
